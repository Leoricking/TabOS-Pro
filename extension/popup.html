<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Tabs Manager Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <h1>Tabs Manager Pro</h1>
    <p class="desc">
      分頁備份、合併、去重、分類、標記、優先級、標籤與每日 Planner。
    </p>

    <section>
      <h2>1. 新備份</h2>
      <button id="backupBtn" class="primary">備份目前所有分頁</button>

      <label class="check">
        <input type="checkbox" id="closeAfterBackup" />
        備份後關閉目前一般網頁分頁
      </label>
    </section>

    <section>
      <h2>2. 合併舊 HTML + 目前分頁</h2>
      <input type="file" id="mergeFile" accept=".html,.htm" />
      <button id="mergeBtn">合併目前分頁並匯出新版 HTML</button>

      <label class="check">
        <input type="checkbox" id="closeAfterMerge" />
        合併後關閉目前一般網頁分頁
      </label>
    </section>

    <section>
      <h2>3. 舊版轉新版</h2>
      <input type="file" id="convertFile" accept=".html,.htm" />
      <button id="convertBtn">轉成新版可管理 HTML</button>
    </section>

    <section>
      <h2>4. Daily Planner</h2>
      <button id="openPlannerBtn" class="primary">開啟每日行程 / 待辦 Planner</button>
    </section>

    <section>
      <h2>Pro 功能</h2>
      <div class="pro-list">
        <div>✅ 狀態：待看 / 重要 / 工作 / 深度閱讀</div>
        <div>✅ 優先級：P1 / P2 / P3</div>
        <div>✅ 自訂 Tags</div>
        <div>✅ 群組批次操作</div>
        <div>✅ 舊 HTML 相容匯入</div>
        <div>✅ Daily Planner：行程 / 待辦 / Tabs / Worklog</div>
      </div>
    </section>

    <div id="status" class="status">等待操作</div>
  </div>

  <script src="merge_engine.js"></script>
  <script src="template_manager.js"></script>
  <script src="popup.js"></script>
</body>
</html>
