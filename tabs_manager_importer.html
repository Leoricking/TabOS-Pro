<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabs Manager Importer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #0f1115;
      color: #e8e8e8;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .sub {
      color: #a9b1bd;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: #171a21;
      border: 1px solid #252b36;
      border-radius: 14px;
      padding: 12px;
    }

    .toolbar input[type="text"] {
      flex: 1;
      min-width: 240px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #353d4c;
      background: #0f1115;
      color: #fff;
      outline: none;
    }

    .toolbar input[type="file"] {
      color: #ddd;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      background: #2b3342;
      color: #fff;
      font-weight: 700;
    }

    button:hover {
      opacity: 0.92;
    }

    button.primary {
      background: #4c7dff;
    }

    button.danger {
      background: #d84d4d;
    }

    button.success {
      background: #2f9d62;
    }

    button.warn {
      background: #c78a21;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: #b7c0cd;
      font-size: 14px;
    }

    .card {
      background: #171a21;
      border: 1px solid #252b36;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .group-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .group-title h2 {
      margin: 0;
      color: #ffb86c;
      font-size: 28px;
      word-break: break-word;
    }

    .group-count {
      color: #9ba6b5;
      font-size: 14px;
      white-space: nowrap;
    }

    .group-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    ul.links {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li.link-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 12px;
      background: #101319;
      border: 1px solid #212736;
      margin-bottom: 10px;
    }

    .link-main {
      min-width: 0;
    }

    .link-title-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .link-title {
      color: #7cb7ff;
      text-decoration: none;
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
    }

    .link-title:hover {
      text-decoration: underline;
    }

    .link-url {
      font-size: 12px;
      color: #8f9aad;
      word-break: break-all;
      line-height: 1.5;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag.unread {
      background: #2a3a58;
      color: #9fc2ff;
    }

    .tag.read {
      background: #294534;
      color: #9ae6b1;
    }

    .empty {
      color: #98a4b6;
      text-align: center;
      padding: 40px 20px;
      background: #171a21;
      border: 1px dashed #394153;
      border-radius: 16px;
    }

    .hint {
      color: #98a4b6;
      font-size: 13px;
      line-height: 1.6;
    }

    .toggle {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: #d4dbe6;
      font-size: 14px;
    }

    .footer-space {
      height: 60px;
    }

    @media (max-width: 720px) {
      li.link-item {
        grid-template-columns: 1fr;
      }

      .item-actions {
        justify-content: flex-start;
      }

      .group-title {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tabs Manager Importer</h1>
    <div class="sub">
      匯入你原本的 <code>tabs_backup.html</code>，自動轉成可管理版。<br>
      支援搜尋、刪除、標記已看、只看未看、匯出整理後版本。
    </div>

    <div class="toolbar">
      <div class="toolbar-row">
        <input type="file" id="fileInput" accept=".html,.htm" />
        <button class="primary" id="importBtn">匯入 backup HTML</button>
        <button id="reloadBtn">重新載入目前資料</button>
        <button class="success" id="exportBtn">匯出整理後 HTML</button>
        <button class="danger" id="clearBtn">清空全部資料</button>
      </div>

      <div class="toolbar-row">
        <input type="text" id="searchInput" placeholder="搜尋標題、網址、群組名稱..." />
        <label class="toggle">
          <input type="checkbox" id="showUnreadOnly" />
          只顯示未看
        </label>
        <button id="expandAllBtn">展開全部群組</button>
        <button id="collapseAllBtn">收合全部群組</button>
      </div>

      <div class="toolbar-row stats" id="stats"></div>
    </div>

    <div id="app"></div>
    <div class="footer-space"></div>
  </div>

  <script>
    const STORAGE_KEY = "tabs_manager_data_v1";
    const COLLAPSE_KEY = "tabs_manager_collapse_v1";

    let groups = [];
    let collapseState = {};

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(groups));
      localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapseState));
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      const rawCollapse = localStorage.getItem(COLLAPSE_KEY);

      groups = raw ? JSON.parse(raw) : [];
      collapseState = rawCollapse ? JSON.parse(rawCollapse) : {};
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function makeId() {
      return "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function updateStats() {
      const groupCount = groups.length;
      const itemCount = groups.reduce((sum, g) => sum + g.items.length, 0);
      const unreadCount = groups.reduce(
        (sum, g) => sum + g.items.filter(x => !x.read).length,
        0
      );
      const readCount = itemCount - unreadCount;

      document.getElementById("stats").innerHTML = `
        <div>群組：<strong>${groupCount}</strong></div>
        <div>總連結：<strong>${itemCount}</strong></div>
        <div>未看：<strong>${unreadCount}</strong></div>
        <div>已看：<strong>${readCount}</strong></div>
      `;
    }

    function normalizeImportedGroups(rawGroups) {
      return rawGroups
        .map(g => ({
          id: g.id || makeId(),
          name: g.name || "未分類",
          items: (g.items || []).map(item => ({
            id: item.id || makeId(),
            title: item.title || item.url || "(無標題)",
            url: item.url || "",
            read: !!item.read,
            removed: !!item.removed
          }))
        }))
        .filter(g => g.items.length > 0);
    }

    function parseBackupHtml(htmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");

      const parsedGroups = [];
      const groupDivs = Array.from(doc.querySelectorAll(".group"));

      if (groupDivs.length > 0) {
        for (const groupDiv of groupDivs) {
          const h2 = groupDiv.querySelector("h2");
          const ul = groupDiv.querySelector("ul");
          if (!h2 || !ul) continue;

          let groupName = h2.textContent || "未分類";
          groupName = groupName.replace(/\(\d+\)\s*$/, "").trim();

          const items = Array.from(ul.querySelectorAll("a"))
            .map(a => ({
              id: makeId(),
              title: (a.textContent || a.href || "(無標題)").trim(),
              url: (a.getAttribute("href") || "").trim(),
              read: false,
              removed: false
            }))
            .filter(x => x.url);

          if (items.length > 0) {
            parsedGroups.push({
              id: makeId(),
              name: groupName,
              items
            });
          }
        }
      }

      if (parsedGroups.length === 0) {
        const fallbackAnchors = Array.from(doc.querySelectorAll("a"))
          .map(a => ({
            id: makeId(),
            title: (a.textContent || a.href || "(無標題)").trim(),
            url: (a.getAttribute("href") || "").trim(),
            read: false,
            removed: false
          }))
          .filter(x => /^https?:/i.test(x.url));

        if (fallbackAnchors.length > 0) {
          parsedGroups.push({
            id: makeId(),
            name: "未分類",
            items: fallbackAnchors
          });
        }
      }

      return normalizeImportedGroups(parsedGroups);
    }

    function importHtmlFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const imported = parseBackupHtml(text);

          if (!imported.length) {
            alert("匯入失敗：沒有解析到可用連結。");
            return;
          }

          groups = imported;
          collapseState = {};
          saveData();
          render();
          alert(`匯入完成，共 ${groups.length} 個群組。`);
        } catch (err) {
          console.error(err);
          alert("匯入失敗：" + err.message);
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function removeItem(groupId, itemId) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;

      group.items = group.items.filter(item => item.id !== itemId);
      groups = groups.filter(g => g.items.length > 0);
      saveData();
      render();
    }

    function toggleRead(groupId, itemId) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;

      const item = group.items.find(x => x.id === itemId);
      if (!item) return;

      item.read = !item.read;
      saveData();
      render();
    }

    function markGroupRead(groupId, readValue) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;

      group.items.forEach(item => {
        item.read = readValue;
      });
      saveData();
      render();
    }

    function removeReadItemsInGroup(groupId) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;

      group.items = group.items.filter(item => !item.read);
      groups = groups.filter(g => g.items.length > 0);
      saveData();
      render();
    }

    function removeReadItemsGlobal() {
      groups.forEach(group => {
        group.items = group.items.filter(item => !item.read);
      });
      groups = groups.filter(g => g.items.length > 0);
      saveData();
      render();
    }

    function openAllUnreadInGroup(groupId) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;

      const unreadItems = group.items.filter(item => !item.read);
      unreadItems.forEach(item => {
        window.open(item.url, "_blank", "noopener");
      });
    }

    function toggleGroupCollapse(groupId) {
      collapseState[groupId] = !collapseState[groupId];
      saveData();
      render();
    }

    function expandAll() {
      groups.forEach(g => {
        collapseState[g.id] = false;
      });
      saveData();
      render();
    }

    function collapseAll() {
      groups.forEach(g => {
        collapseState[g.id] = true;
      });
      saveData();
      render();
    }

    function exportManagedHtml() {
      const visibleData = groups.map(group => ({
        name: group.name,
        items: group.items
      }));

      const html = `<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Managed Tabs Backup</title>
<style>
body {
  margin: 0;
  font-family: Arial, "Microsoft JhengHei", sans-serif;
  background: #0f1115;
  color: #e8e8e8;
}
.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}
h1 {
  margin: 0 0 12px;
}
.meta {
  color: #9ba6b5;
  margin-bottom: 20px;
}
.group {
  background: #171a21;
  border: 1px solid #252b36;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}
h2 {
  margin: 0 0 10px;
  color: #ffb86c;
}
ul {
  margin: 0;
  padding-left: 20px;
}
li {
  margin: 8px 0;
}
a {
  color: #7cb7ff;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
.tag {
  display: inline-block;
  margin-left: 8px;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 999px;
}
.read {
  background: #294534;
  color: #9ae6b1;
}
.unread {
  background: #2a3a58;
  color: #9fc2ff;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Managed Tabs Backup</h1>
  <div class="meta">匯出時間：${escapeHtml(new Date().toLocaleString("zh-TW"))}</div>
  ${visibleData.map(group => `
    <div class="group">
      <h2>${escapeHtml(group.name)} (${group.items.length})</h2>
      <ul>
        ${group.items.map(item => `
          <li>
            <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
            <span class="tag ${item.read ? "read" : "unread"}">${item.read ? "已看" : "未看"}</span>
          </li>
        `).join("")}
      </ul>
    </div>
  `).join("")}
</div>
</body>
</html>`;

      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const pad = n => String(n).padStart(2, "0");
      const filename =
        `managed_tabs_${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}_` +
        `${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}.html`;

      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function render() {
      updateStats();

      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      const unreadOnly = document.getElementById("showUnreadOnly").checked;
      const app = document.getElementById("app");

      const filteredGroups = groups
        .map(group => {
          const items = group.items.filter(item => {
            if (unreadOnly && item.read) return false;

            const hay = [
              group.name,
              item.title,
              item.url
            ].join(" ").toLowerCase();

            return !keyword || hay.includes(keyword);
          });

          return {
            ...group,
            items
          };
        })
        .filter(group => group.items.length > 0);

      if (!filteredGroups.length) {
        app.innerHTML = `
          <div class="empty">
            目前沒有可顯示的資料。<br><br>
            先匯入你的 <code>tabs_backup.html</code>，或清掉搜尋條件。
          </div>
        `;
        return;
      }

      app.innerHTML = filteredGroups.map(group => {
        const isCollapsed = !!collapseState[group.id];
        const unreadCount = group.items.filter(x => !x.read).length;

        return `
          <div class="card">
            <div class="group-title">
              <h2>${escapeHtml(group.name)}</h2>
              <div class="group-count">共 ${group.items.length} / 未看 ${unreadCount}</div>
            </div>

            <div class="group-actions">
              <button onclick="toggleGroupCollapse('${group.id}')">${isCollapsed ? "展開" : "收合"}</button>
              <button class="success" onclick="markGroupRead('${group.id}', true)">本群全標已看</button>
              <button class="warn" onclick="markGroupRead('${group.id}', false)">本群全標未看</button>
              <button class="primary" onclick="openAllUnreadInGroup('${group.id}')">開本群未看</button>
              <button class="danger" onclick="removeReadItemsInGroup('${group.id}')">刪本群已看</button>
            </div>

            ${isCollapsed ? "" : `
              <ul class="links">
                ${group.items.map(item => `
                  <li class="link-item">
                    <div class="link-main">
                      <div class="link-title-row">
                        <a class="link-title" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>
                        <span class="tag ${item.read ? "read" : "unread"}">${item.read ? "已看" : "未看"}</span>
                      </div>
                      <div class="link-url">${escapeHtml(item.url)}</div>
                    </div>

                    <div class="item-actions">
                      <button onclick="window.open('${escapeHtml(item.url)}', '_blank', 'noopener')">開啟</button>
                      <button class="success" onclick="toggleRead('${group.id}', '${item.id}')">${item.read ? "改未看" : "標已看"}</button>
                      <button class="danger" onclick="removeItem('${group.id}', '${item.id}')">移除</button>
                    </div>
                  </li>
                `).join("")}
              </ul>
            `}
          </div>
        `;
      }).join("");
    }

    document.getElementById("importBtn").addEventListener("click", () => {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];
      if (!file) {
        alert("請先選擇你的 tabs_backup.html");
        return;
      }
      importHtmlFile(file);
    });

    document.getElementById("reloadBtn").addEventListener("click", () => {
      loadData();
      render();
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      exportManagedHtml();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      const ok = confirm("確定要清空目前管理器內的全部資料嗎？");
      if (!ok) return;

      groups = [];
      collapseState = {};
      saveData();
      render();
    });

    document.getElementById("searchInput").addEventListener("input", render);
    document.getElementById("showUnreadOnly").addEventListener("change", render);
    document.getElementById("expandAllBtn").addEventListener("click", expandAll);
    document.getElementById("collapseAllBtn").addEventListener("click", collapseAll);

    loadData();
    render();
  </script>
</body>
</html>
