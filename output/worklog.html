<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TabOS Worklog Manager</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #0f1115;
  color: #e8e8e8;
  font-family: Arial, "Microsoft JhengHei", sans-serif;
}

.wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

h1 {
  margin: 0 0 8px;
  font-size: 38px;
  font-weight: 900;
}

.sub {
  color: #a9b1bd;
  margin-bottom: 22px;
  line-height: 1.7;
  font-size: 15px;
}

.toolbar {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  background: #171a21;
  border: 1px solid #252b36;
  border-radius: 16px;
  padding: 14px;
  align-items: center;
}

input,
select,
textarea {
  background: #0f1115;
  color: white;
  border: 1px solid #353d4c;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
}

#search {
  flex: 1;
  min-width: 320px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 11px 16px;
  cursor: pointer;
  background: #2b3342;
  color: white;
  font-weight: 800;
  font-size: 14px;
}

button:hover {
  opacity: 0.92;
}

.primary { background: #4c7dff; }
.success { background: #2f9d62; }
.warn { background: #c78a21; }
.danger { background: #d84d4d; }

.stats {
  color: #b7c0cd;
  font-size: 15px;
  line-height: 1.8;
}

.stats strong {
  color: #d7e7ff;
}

.card {
  background: #171a21;
  border: 1px solid #252b36;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 18px;
}

.date-title {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 14px;
}

.date-title h2 {
  color: #ffb86c;
  margin: 0;
  font-size: 26px;
  font-weight: 900;
}

.item {
  display: grid;
  grid-template-columns: minmax(360px, 1fr) auto;
  gap: 12px;
  align-items: center;
  background: #101319;
  border: 1px solid #212736;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  line-height: 1.6;
}

.item.command {
  background: #070a0f;
}

.text {
  word-break: break-word;
  white-space: pre-wrap;
}

.command .text {
  font-family: Consolas, "Courier New", monospace;
  color: #d7ffb8;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.tag {
  display: inline-flex;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  background: #2a3a58;
  color: #9fc2ff;
}

.tag.todo { background: #6b1f1f; color: #ffd0d0; }
.tag.ip { background: #5b461f; color: #ffe4a3; }
.tag.cmd { background: #294534; color: #9ae6b1; }
.tag.edited { background: #4b2f63; color: #e9d5ff; }

.hl-ip {
  color: #ffe4a3;
  font-weight: 900;
}

.actions {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.actions button {
  min-width: 72px;
}

.empty {
  padding: 48px;
  text-align: center;
  border-radius: 16px;
  border: 1px dashed #394153;
  color: #98a4b6;
}

.modal-mask {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal {
  width: min(900px, 92vw);
  background: #171a21;
  border: 1px solid #394153;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 80px rgba(0,0,0,.4);
}

.modal h2 {
  margin: 0 0 14px;
}

.modal textarea {
  width: 100%;
  min-height: 160px;
  resize: vertical;
  line-height: 1.6;
}

.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 12px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 14px;
}

@media (max-width: 900px) {
  .item {
    grid-template-columns: 1fr;
  }

  .actions {
    flex-wrap: wrap;
    justify-content: flex-start;
    white-space: normal;
  }

  .modal-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="wrap">
  <h1>TabOS Worklog Manager</h1>
  <div class="sub">
    工作日誌 / 指令庫轉成可搜尋、可分類、可閱讀、可修改的知識庫。
  </div>

  <div class="toolbar">
    <div class="row">
      <input id="search" placeholder="搜尋日期、內容、IP、分類、指令..." />

      <select id="category">
        <option value="">全部分類</option>
      </select>

      <select id="dateSort">
        <option value="desc">日期：新到舊</option>
        <option value="asc">日期：舊到新</option>
      </select>

      <label>
        <input type="checkbox" id="cmdOnly" />
        只看指令
      </label>

      <label>
        <input type="checkbox" id="todoOnly" />
        只看 TODO
      </label>

      <button id="expandAll">展開全部</button>
      <button id="collapseAll">收合全部</button>
      <button id="exportBtn" class="success">匯出修改後 HTML</button>
      <button id="resetBtn" class="danger">還原原始資料</button>
    </div>

    <div class="row stats" id="stats"></div>
  </div>

  <div id="app"></div>
</div>

<div class="modal-mask" id="editModal">
  <div class="modal">
    <h2>修改工作日誌</h2>

    <textarea id="editText"></textarea>

    <div class="modal-grid">
      <div>
        <label>日期</label>
        <input id="editDate" style="width:100%;" />
      </div>

      <div>
        <label>分類</label>
        <input id="editCategory" style="width:100%;" />
      </div>

      <div>
        <label>
          <input type="checkbox" id="editCommand" />
          指令
        </label>
      </div>

      <div>
        <label>
          <input type="checkbox" id="editTodo" />
          TODO
        </label>
      </div>
    </div>

    <div class="modal-actions">
      <button id="cancelEdit">取消</button>
      <button id="saveEdit" class="success">儲存修改</button>
    </div>
  </div>
</div>

s": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_304", "date": "2024/11/21", "text": "2. x86 掛掉, 透過 BMC 讀取 x86 相關 error log register", "category": "BMC", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_305", "date": "2024/11/21", "text": "一般 Server 應該兩種 方法都有", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_307", "date": "2024/11/21", "text": "林口 BIOS 已實作 BMC sel 日誌功能", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_308", "date": "2024/11/21", "text": "1. x86 出現異常 , BIOS 主動透過 RAS sel log 送 error log 給 BMC(被動), BMC & BIOS 都要有對應 code", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_309", "date": "2024/11/21", "text": "一般會出現 error 有三種情況", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_311", "date": "2024/11/21", "text": "CPU 內部問題", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_312", "date": "2024/11/21", "text": "Memory 問題(Dimm 問題)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_313", "date": "2024/11/21", "text": "PCIe 問題(PCIe slot 若有問題, 會無法正確送達)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_316", "date": "2024/11/21", "text": "2. BMC(主動) 透過 IPMB 走 PECI 通道去 dump 特定 register 的 error log", "category": "BMC", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_319", "date": "2024/11/21", "text": "3. BMC 去控制 BIOS menu, BIOS 與 BMC 都會將 BIOS 設定值寫入 json 檔,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_320", "date": "2024/11/21", "text": "BMC 讀取 json 在透過 ipmi(BIOS 設定值 structure > json) 去對 BIOS 設定, BIOS 再將設定值寫入內部", "category": "BIOS", "ips": [], "is_comm ", "text": "ID=debian", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_581", "date": "2025/01/07", "text": "HOME_URL=\"https://www.debian.org/\"", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_582", "date": "2025/01/07", "text": "SUPPORT_URL=\"https://www.debian.org/support\"", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_583", "date": "2025/01/07", "text": "BUG_REPORT_URL=\"https://bugs.debian.org/\"", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_584", "date": "2025/01/07", "text": "root@Proxmox-Accton:~#", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_586", "date": "2025/01/16", "text": "//20250116", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_587", "date": "2025/01/16", "text": "AMD GPU RDMA (RCCL)測試內容 study", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_588", "date": "2025/01/16", "text": "RCCL 是一個獨立的函式庫，提供針對 AMD GPU 最佳化的多 GPU 和多節點集體通訊原語。", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_590", "date": "2025/01/16", "text": "RCCL 利用 PCIe 和 xGMI 高速互連進行節點內通信，並利用 InfiniBand、RoCE 和 TCP/IP 進行節點間通訊。", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_592", "date": "2025/01/16", "text": "RCCL 支援在單節點或多節點平台上安裝任意數量的 GPU。它可以輕鬆整合到單一進程或多進程（例如 MPI）應用程式中。", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_595", "date": "2025/01/16", "text": "RCCL 是AMD ROCm（Radeon Open Compute）生態系統的一部分，ROCm 是AMD 的開源運算平台，支援GPU 加速運算。", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_596", "date": "2025/0 的設定方法如下2：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_810", "date": "2025/03/05", "text": "進入BIOS設定介面，選擇Socket Configuration -> Common RefCode Configuration", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_811", "date": "2025/03/05", "text": "將Mmio High Base 的值改為24T或更大，儲存並退出", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_812", "date": "2025/03/05", "text": "重啟伺服器，檢查是否能正常運作nvidia-smi 指令", "category": "GPU", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_813", "date": "2025/03/05", "text": "一般來說，Mmio High Base 的值越大，為PCIe裝置分配的記憶體空間越大，效能越好，但是也會佔用更多的記憶體資源，因此您需要根據您的實際需求和配置來選擇一個合適的值。如果您不確定，您可以參考H3C的產品手冊3，或聯絡H3C的技術支援4。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_817", "date": "2025/03/05", "text": "BIOS裡面怎麼打開CPU power saving mode?", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_818", "date": "2025/03/05", "text": "Socket Configuration -> Advanced Power Management Configuration -> Package C State Control ->Package C State -> C6", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_821", "date": "2025/03/13", "text": "//20250313", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_822", "date": "2025/03/13", "text": "software RoCE", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_824", "date": "2025/03/13", "text": "root@AGS8200:~# modinfo rdma_rxe", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_825", "date": "2025/03/13", "text": "filename:       /lib/modules/5.15.0-130-generic/kernel/drivers/infiniband/sw/rxe/rdma_rxe.ko", "category": "RDMA", "ips": [], "i dited": false}, {"id": "log_939", "date": "2025/04/08", "text": "IouIndex - I/O Unit Index，即輸入/輸出單元索引", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_943", "date": "2025/04/08", "text": "💡 為什麼這段重要？", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_944", "date": "2025/04/08", "text": "在實作 PCIe bifurcation 的時候，retimer 通常需要根據 slot 或 lane 分配做初始化。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_945", "date": "2025/04/08", "text": "比如你要把一個 PCIe x16 的通道分為 x8 + x8，那兩個 retimer 就可能要開啟不同的路徑，或設成不同的轉發模式。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_946", "date": "2025/04/08", "text": "這些設定必須在 BIOS PEI 階段就完成，否則開機後系統抓不到裝置或會不穩定。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_949", "date": "2025/04/14", "text": "//20250414", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_950", "date": "2025/04/14", "text": "D:\\code\\test1\\Accton-EagleStream\\Original\\Intel\\EagleStreamFspPkg\\Library\\FspUbaPlatLib\\IioPortBifurcation.c", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_951", "date": "2025/04/14", "text": "AutoBifurcationSetting", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_952", "date": "2025/04/14", "text": "M12 / M15 & M16 / M17 邏輯對不上", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_956", "date": "2025/04/16", "text": "//20250416", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_957", "date": "2025/04/16", "text": "onenote:", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_958", "date": "2025/04/16", "text": "https://accton365.sharepoint.com/sites/AcctonSoftwareTechnologyExchange/SiteAssets/Accton%20Software%20Technology%20Exchange%20筆記本/SONiC.one#NOS%20firmware%20upgrade%20method&section-id=%7BD1246DCF-6E08-497E-BE8A-553B8A18D3E6%7D&page-id=%7BDD3803EE-D8CD-48F5-8438-0E38283CC6DA%7D&end", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_960", "date": "2025/04/16", "text": "系統透過 Flash rom 走 SPI 去更新 BIOS", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_962", "date": "2025/04/16", "text": "1. Flash rom source code, 如何修改?", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_963", "date": "2025/04/16", "text": "2. BIOS lock 如何解除", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_965", "date": "2025/04/16", "text": "AI server 8200 & 2280 做法是會清除 DMI table 會清掉 SN,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_966", "date": "2025/04/16", "text": "如果需要SN, 可由 BMC 讀取", "category": "BMC", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_968", "date": "2025/04/16", "text": "可以將 flashrom 移植到 SONiC 或任何其他客戶所需的 OS。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_969", "date": "2025/04/16", "text": "但限制是 DMI 資訊和 BIOS 設定將會遺失。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_972", "date": "2025/04/16", "text": "並且在更新備用 BIOS（非活動 BIOS）時會出現一些問題。該問題與 EC 有關。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_973", "date": "2025/04/16", "text": "另一個解決方案是從 BIOS 實作自動更新：", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_974", "date": "2025/04/16", "text": "1. 重啟", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_975", "date": "2025/04/16", "text": "2. BIOS檢查EFI目錄中是否有BIOS_XXX.bin。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_976", "date": "2025/04/16", "text": "3. 運行afulnx64_efi BIOS_XXX.bin。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_980", "date": "2025/04/16", "text": "flashrom", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_981", "date": "2025/04/16", "text": "一個開源工具，大多數情況下我們不需要任何移植就可以使用。當我們使用新的 CPU/PCH 平台時，就會進行移植工作。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_982", "date": "2025/04/16", "text": "該工具透過 PCI Express 配置空間（記憶體 IO）控制 PCH。安全核心禁止記憶體IO。需要在安全內核上投入額外的精力。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_983", "date": "2025/04/16", "text": "BIOS 應該會停用 SPI/BIOS 保護以支援此工具。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_984", "date": "2025/04/16", "text": "BIOS 應該會增加一個功能，為 ONIE/SONiC/Ubuntu 新增啟動選項（取決於客戶的要求）。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_985", "date": "2025/04/16", "text": "用戶需要在某些平台上處理EC問題。 （EC 將從 SPI 檢查 CPU 資訊。更新 BIOS SPI 可能會觸發 EC 看門狗逾時並重新啟動。）", "category": "BIOS", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_986", "date": "2025/04/16", "text": "該工具直接擦除整個SPI並將BIOS bin檔案寫入其中。 DMI 表和 BIOS 設定將會遺失。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_987", "date": "2025/04/16", "text": "需要在客戶的作業系統下進行測試，以檢查是否有任何程式庫/核心問題。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_988", "date": "2025/04/16", "text": "無需啟動即可更新主/次 BIOS 映像。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_989", "date": "2025/04/16", "text": "如果客戶可以接受限制，我們通常會提供此選項，因為它可以在不中斷主機 CPU 功能的情況下更新主/備份 BIOS。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_990", "date": "2025/04/16", "text": "如果 HW 解決方案具有 BMC，這將是次要更新選項。", "category": "BMC", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_992", "date": "2025/04/16", "text": "=========================================", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_993", "date": "2025/04/16", "text": "//透過 flasrom 走 SPI 更新 BIOS", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_994", "date": "2025/04/16", "text": "https://git88.accton.com/atc_bringup/GS-8280/diag/-/blob/master/config/platform/ags8200/test_script/fwchk_util.sh", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_995", "date": "2025/04/16", "text": "ipmitool 送 cmd 使 ME 進 recovery mode(關掉 ME),", "category": "BMC", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_996", "date": "2025/04/16", "text": "確認進 recovery mode 後 flashrom 透過 spi controller 去讀寫芯片", "category": "BIOS", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_997", "date": "2025/04/16", "text": "讀 bioslayout, build code 目錄下有個 bios layout 資料夾,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_998", "date": "2025/04/16", "text": "用 tool 來讀去 bioslayout, 比對和 build code 目錄下有個 bios layout 資料夾", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_999", "date": "2025/04/16", "text": "比對結果是否一致", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1000", "date": "2025/04/16", "text": "PCH(南橋) 升級 flash", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1002", "date": "2025/04/16", "text": "1. 編 flashrom", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1003", "date": "2025/04/16", "text": "2. 解析 bios layout(如果 chipset 沒有支援, 需要 porting)", "category": "BIOS", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1005", "date": "2025/04/16", "text": "目標 - 透過 flashrom 更新 bios,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1006", "date": "2025/04/16", "text": "不洗掉 DMI table & user setting => 智邦 KPI", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1008", "date": "2025/04/16", "text": "//BIOS", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1009", "date": "2025/04/16", "text": "CPU 上電後，主機板或 CPU CPLD 中的看門狗在收到 CPU 板電源良好訊號時將進行倒數計時。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1010", "date": "2025/04/16", "text": "當 BIOS 啟動到特定階段（BIOS 啟動完成）時，看門狗將停止。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1011", "date": "2025/04/16", "text": "如果 BIOS 啟動未完成，且看門狗過期，CPLD/EC 將把 SPI 多工器變更為輔助 SPI 並重設。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1013", "date": "2025/04/16", "text": "先拿 AMX3200 練習刷 flashrom & porting", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1015", "date": "2025/04/16", "text": "/home/rossi/auto_startup_vnc.sh", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1017", "date": "2025/04/16", "text": "// ONIE diag, 本來在 ONIE 環境下安裝,", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1018", "date": "2025/04/16", "text": "// 但目標在客戶 linux 環境上安裝", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1019", "date": "2025/04/16", "text": "// Diag - 系統診斷工具, 一個小型的 linux 作業系統, 比 ubuntu 還簡易", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1020", "date": "2025/04/16", "text": "// 主要用來做硬體檢測或一些升級工具", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1021", "date": "2025/04/16", "text": "// Diag 原本只能在 ONIE 系統下安裝, 目標是要在客人的系統(EX: Sonic 系統下)", "category": "Network", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1022", "date": "2025/04/16", "text": "// 安裝 Diag, 所以要改 install.sh 腳本內的順序", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1023", "date": "2025/04/16", "text": "// install.sh 改完再重包回安裝檔, 即可在 ONIE 系統 & 客人系統下安裝 Diag", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1024", "date": "2025/04/16", "text": "// 做完在 ubuntu or 客人系統下安裝做驗證", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1025", "date": "2025/04/16", "text": "檢查 checksum 是否一致", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1026", "date": "2025/04/16", "text": "是的話開始解壓縮, 產生 install.sh, 有個 install 目錄", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1027", "date": "2025/04/16", "text": "onie-sysinfo, 檢查是 gpt or msdos", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1028", "date": "2025/04/16", "text": "uname -h 檢查環境", "category": "Command", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1029", "date": "2025/04/16", "text": "onie-syseeprom", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1030", "date": "2025/04/16", "text": "create_diag_gpt_partition -> ... -> 安裝 grub -> 進 EFI", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1034", "date": "2025/04/18", "text": "//2025/04/18", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1035", "date": "2025/04/18", "text": "Computex Demoing targets", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1036", "date": "2025/04/18", "text": "1. Local lab APN benifit demo ( 拿兩組 TH4 + ZR+ local testing, maybe with 影像use case or something can show the latency enhancement)", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1037", "date": "2025/04/18", "text": "Target: 準備demo video or remote env 在computex現場展示讓客人了解APN帶來的低延遲好處", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1038", "date": "2025/04/18", "text": "Demo Video Content: 左邊有APN 可能看到YOLO 影像辨識很快出現綠框  右邊要等一陣子", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1039", "date": "2025/04/18", "text": "Data plane prepare: Will + Rossi", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1040", "date": "2025/04/18", "text": "TH4 * 2", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1041", "date": "2025/04/18", "text": "ZR+ *2", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1042", "date": "2025/04/18", "text": "Cable (可能要找個10km的來故意製造高延遲, Chris說可以找Talent)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1045", "date": "2025/04/18", "text": "tranciver dr 只能接 MPO 光纖線,", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1047", "date": "2025/04/18", "text": "若要接 10KM 以上是否需要 ZR+ 等級的 tranciver?", "category": "Network", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1049", "date": "2025/04/18", "text": "TH4 透過 i2c 去改 tranciver ZR 功耗", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1052", "date": "2025/04/18", "text": "智邦的E810 OCP卡 插上智邦的tranceiver 好像都不會link", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1053", "date": "2025/04/18", "text": "=> 必須要升級firmware..", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1055", "date": "2025/04/18", "text": "AGS8200 (172.20.0.162) ens2f0 <---> RS2280 (172.20.0.180) ens2f0np0", "category": "General", "ips": ["172.20.0.162", "172.20.0.180"], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1056", "date": "2025/04/18", "text": "已經link了", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1057", "date": "2025/04/18", "text": "193.168.1.162 <---> 193.168.1.180", "category": "General", "ips": ["193.168.1.162", "193.168.1.180"], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1060", "date": "2025/04/18", "text": "//注意", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1061", "date": "2025/04/18", "text": "一般情形下,", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1062", "date": "2025/04/18", "text": "build code server -> 盡量不使用 root, 避免破壞 server 環境", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1063", "date": "2025/04/18", "text": "操作系統 -> 盡量使用 sudo, 避免一般權限不足無法進行後續操作,", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1065", "date": "2025/04/18", "text": "ex: goldstone 一般權限無法操作 ifconfig", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1067", "date": "2025/04/25", "text": "//20250425", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1068", "date": "2025/04/25", "text": "//build flashrom", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1069", "date": "2025/04/25", "text": "meson setup builddir", "category": "Command", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1070", "date": "2025/04/25", "text": "meson compile -C builddir", "category": "Command", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1071", "date": "2025/04/25", "text": "meson test -C builddir", "category": "Command", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1073", "date": "2025/04/25", "text": "如何得知 bios layout?", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1074", "date": "2025/04/25", "text": "1. build BIOS code 後產生 layout.txt", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1075", "date": "2025/04/25", "text": "2. 透過 tool 去讀", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1078", "date": "2025/04/25", "text": "//RS2280", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1079", "date": "2025/04/25", "text": "172.20.0.181", "category": "General", "ips": ["172.20.0.181"], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1080", "date": "2025/04/25", "text": "root/accton", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1082", "date": "2025/04/25", "text": "193.168.1.180", "category": "General", "ips": ["193.168.1.180"], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1085", "date": "2025/04/25", "text": "//GD2", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1086", "date": "2025/04/25", "text": "172.20.0.162", "category": "General", "ips": ["172.20.0.162"], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1087", "date": "2025/04/25", "text": "accton/accton", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1089", "date": "2025/04/25", "text": "193.168.1.162", "category": "General", "ips": ["193.168.1.162"], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1091", "date": "2025/05/06", "text": "//20250506", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1092", "date": "2025/05/06", "text": "BIOS code 內 SMBios 的 sdl 內的 string 為 build 完", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1093", "date": "2025/05/06", "text": "code 包進 .bin 內的 DMI table 之值,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1094", "date": "2025/05/06", "text": "所以改 sdl 對應 string 即可", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1096", "date": "2025/05/06", "text": "AFU 為 AMI tool, 內部包含會計算 dmi table 位置的 funtion,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1097", "date": "2025/05/06", "text": "所以才有辦法精準繞過 dmi table 不覆蓋情況下更新 bios,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1098", "date": "2025/05/06", "text": "flashrom 更新 bios 如果要做到必須去算 dmi table 起始位置,", "category": "BIOS", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1099", "date": "2025/05/06", "text": "但其缺點為只要稍微新增功能或新增刪減 token, 其位置就跑掉要重算,", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1100", "date": "2025/05/06", "text": "實務上比較不可行", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1102", "date": "2025/05/06", "text": "目標 : 保留 DMI table & user config", "category": "BIOS", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1104", "date": "2025/05/06", "text": "“AMI 韌體更新實用程式”（AFU）是為公眾設計的，可供所有人下載和使用，", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1105", "date": "2025/05/06", "text": "但該實用程式只能幫助刷新 AMI BIOS ，而不能修改。不要將此 AMI 實用程式與", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1106", "date": "2025/05/06", "text": "AMI 工具（如 MMTool）混合使用，這些工具可以修改 BIOS，", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1107", "date": "2025/05/06", "text": "並且僅由 AMI 提供給主機板製造商", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1109", "date": "2025/05/06", "text": "Aptio V UEFI Editor", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1110", "date": "2025/05/06", "text": "https://github.com/BoringBoredom/UEFI-Editor", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1113", "date": "2025/05/06", "text": "實務上, 一般常見為寫腳本, 在更新 bios 前先將 dmi table", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1114", "date": "2025/05/06", "text": "複製出來, 燒完 bios 後再更新回去 dmi table", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1117", "date": "2025/05/06", "text": "CPU", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1118", "date": "2025/05/06", "text": "睡眠時, CPU 是所有核心輪流睡眠還是一起進入睡眠?", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1120", "date": "2025/05/06", "text": "//NEC network user manual 閱讀順序", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1121", "date": "2025/05/06", "text": "ch3 -> ch5 -> ch2", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1123", "date": "2025/05/09", "text": "//2025/05/09", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1124", "date": "2025/05/09", "text": "OWS HW sample POC assisting Peter005 ( around June~July)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1125", "date": "2025/05/09", "text": "Cecilia assist HCCL", "category": "RDMA", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1126", "date": "2025/05/09", "text": "Rossi assist Gaudi1 CICT env setup", "category": "GPU", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1129", "date": "2025/05/15", "text": "//2025/05/15", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1130", "date": "2025/05/15", "text": "1.備份原始 BIOS 和 DMI 資料", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1132", "date": "2025/05/15", "text": "./flashrom -p internal -r backup_bios.rom", "category": "BIOS", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1134", "date": "2025/05/15", "text": "提取原始 BIOS 映像中的 DMI 資料。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1135", "date": "2025/05/15", "text": "sudo dmidecode > dmi_backup.txt", "category": "BIOS", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1138", "date": "2025/05/15", "text": "2. 使用 UEFITool 提取原始 DMI 資料", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1140", "date": "2025/05/15", "text": "下載並安裝 UEFITool。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1142", "date": "2025/05/15", "text": "使用 UEFITool 打開當前的 BIOS 映像（backup_bios.rom）。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1144", "date": "2025/05/15", "text": "在 UEFITool 中，找到與 DMI 資料表 相關的區域，通常它位於 BIOS 映像的特定區塊。您可以將這部分資料提取並保存。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1146", "date": "2025/05/15", "text": "保存您提取的 DMI 資料區塊，這些資料稍後可以用來注入到更新過的 BIOS 映像中。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1149", "date": "2025/05/15", "text": "3. 更新 BIOS image", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1151", "date": "2025/05/15", "text": "在成功備份 BIOS 和提取 DMI 資料後，您可以進行 BIOS 更新。這是更新 BIOS 的標準命令：", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1153", "date": "2025/05/15", "text": "flashrom -p <programmer> -w new_bios.rom", "category": "BIOS", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1155", "date": "2025/05/15", "text": "./flashrom -p internal -l layout.txt -i BIOS -w AMX3200_bios_v51.01.00.02.bin --noverify-all", "category": "BIOS", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1157", "date": "2025/05/15", "text": "其中 new_bios.rom 是您希望更新的新的 BIOS 映像。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1160", "date": "2025/05/15", "text": "4. 將 DMI 資料注入到更新後的 BIOS", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1162", "date": "2025/05/15", "text": "使用 UEFITool 將 DMI 資料注入 BIOS 映像：", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1164", "date": "2025/05/15", "text": "打開 UEFITool，將新的 BIOS 映像（new_bios.rom）加載進去。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1166", "date": "2025/05/15", "text": "找到您提取的 DMI 資料區域，並將其注入到新 BIOS 映像中。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1168", "date": "2025/05/15", "text": "保存更新後的 BIOS 映像。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1170", "date": "2025/05/15", "text": "這樣，您就可以保證原本的 DMI 資料被保留並成功寫入更新後的 BIOS 映像。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1172", "date": "2025/05/15", "text": "./flashrom -p internal -w updated_bios_with_dmi.rom", "category": "BIOS", "ips": [], "is_command": true, "is_todo": false, "edited": false}, {"id": "log_1174", "date": "2025/05/15", "text": "其中，updated_bios_with_dmi.rom 是包含原始 DMI 資料的更新後的 BIOS 映像。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1177", "date": "2025/05/16", "text": "//2025/05/16", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1178", "date": "2025/05/16", "text": "AMX3200", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1179", "date": "2025/05/16", "text": "Link up", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1180", "date": "2025/05/16", "text": "切換頻率, wavelength...", "category": "General", "ips": [], "is_com : "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1377", "date": "2025/07/16", "text": "BMC 的 PXE Boot 指令如何選擇 port", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1378", "date": "2025/07/16", "text": "BMC/IPMI 的 PXE boot 指令（如 Chassis Bootdev PXE）通常只會要求「PXE boot」，不會細到指定哪個 port。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1379", "date": "2025/07/16", "text": "BIOS/UEFI 會根據 BootOrder 或 BootOptionList 的順序，選擇第一個可用的 PXE boot option。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1380", "date": "2025/07/16", "text": "如果只有一個 PXE boot option 是 enabled/active，BMC 的 PXE boot 就會用那個 port。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1381", "date": "2025/07/16", "text": "如果有多個 PXE boot option 都 enabled，則會依 BootOrder 順序，選擇最前面的那個。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1384", "date": "2025/07/22", "text": "//20250722", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1385", "date": "2025/07/22", "text": "AGS8600: CPU 400W *2 + Mi325 1000W * 8 = 8800 往上取整數 -> 抓10000W MAX", "category": "GPU", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1387", "date": "2025/07/22", "text": "(10000/6 (PSU) ) / 220V = 7.5 A", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1388", "date": "2025/07/22", "text": "這樣10A的轉接頭應該夠用", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1390", "date": "2025/08/01", "text": "//20250801", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1391", "date": "2025/08/01", "text": "AGS8600 SN: BD2H512000  "text": "liqid 設備操作 spec 研讀", "category": "Liqid", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1465", "date": "2025/09/01", "text": "請領單申請", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1468", "date": "2025/09/01", "text": "確認 ET7402-LR4 / ET7402-SR4 CX7 可用,", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1469", "date": "2025/09/01", "text": "光纖線用哪種, 哪個請領費用較低, 請領時間要多久", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1471", "date": "2025/09/01", "text": "請領 LR/SR", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1473", "date": "2025/09/01", "text": "預計", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1475", "date": "2025/09/01", "text": "MiTac", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1476", "date": "2025/09/01", "text": "Q1. BIOS 是否有 afulax64.efi 以外的升級方法", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1477", "date": "2025/09/01", "text": "A1. 正常情況下，可以在 UEFI shell 下本地更新 G8825Z5 的 BIOS，也可以透過遠端客戶端的瀏覽器更新 BIOS。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1478", "date": "2025/09/01", "text": "=> 提供GUI 操作畫面?  已提供", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1479", "date": "2025/09/01", "text": "Q2. 用 mct_redfish_update.sh 用 out-band mode 更新是 BMC, BIOS, CPLD 都支援?", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1480", "date": "2025/09/01", "text": "是否有要注意的地方", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1481", "date": "2025/09/01", "text": "A2. Mct_redfish_update.sh 僅用於更新 BMC 韌體。", "category": "BMC", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1483", "date": "2025/09/01", "text": "Q3. BMC, BIOS 是否有備區，有沒有救援方案", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1484", "date": "2025/09/01", "text": "A3. RD team feedback below,", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1485", "date": "2025/09/01", "text": "BMC, BIOS 沒有備區,", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1487", "date": "2025/09/01", "text": "BIOS救援方式如下:", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1488", "date": "2025/09/01", "text": "1.Recovery 方式, BIOS 更新過程中或者在 BIOS 損壞時恢復系统的一種機制。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1489", "date": "2025/09/01", "text": "特别是在更新 BIOS過程中如果遇到中斷（如斷電）或更新不正確時，可以幫助用戶恢復系统，使系統正常工作。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1490", "date": "2025/09/01", "text": "=> 如果沒有備區 如何進Recovery ?  透過 afulax64.efi 或 BMC recovery", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1491", "date": "2025/09/01", "text": "2.BMC功能正常情況下,透過web方式重刷BIOS", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1492", "date": "2025/09/01", "text": "=> 是否提供 BMC/BIOS bin? 會", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1493", "date": "2025/09/01", "text": "Q4. BMC WEB 網頁升級，有哪些限制 ? 之前將所有配置保留造成 SSL ERROR", "category": "BMC", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1494", "date": "2025/09/01", "text": "A4. 我建議僅在更新 BMC 韌體時保留 IPMI、網路和 Redfish 設定。", "category": "BMC", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1496", "date": "2025/09/01", "text": "Q5. 承上 BMC, BIOS, CPLD 都可利用網頁可升級嗎? 請問各自有什麼要注意的", "category": "BIOS", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1497", "date": "2025/09/01", "text": "A5. 只有在更新 BMC 韌體時才能保留配置，更新 BIOS 和 CPLD 韌體時會完全更新。", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1499", "date": "2025/09/01", "text": "Q6. BMC WEB 是否支援 PXE 設定 (redfish/ipmitool)", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1500", "date": "2025/09/01", "text": "A6. Current v0.19.0 BMC FW can use WebBIOS to change PXE LAN as 1st boot device before reboot OS, then boot from PXE LAN to connect PXE server after reboot OS.", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1501", "date": "2025/09/01", "text": "=> PXE multi device 預設讀哪個 interface? PXE server 端決定 PXE MAC 作控管", "category": "BIOS", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1503", "date": "2025/09/01", "text": "Q7. event log 產生機制 (之前測試上下電似乎沒有產生 log)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1504", "date": "2025/09/01", "text": "A7. 從電源拔出電源線時應該會發生交流電源遺失事件，再次檢查確認。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_1506", "date": "2025/09/01", "text": "Q8. 會提供 user guide 嗎?", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1507", "date": "2025/09/01", "text": "A8. PM 團隊已在 Mitac 網站上發布了 G8825Z5 手冊，您可以從以下鏈接下載。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_1508", "date": "2025/09/01", "text": "https://www.mitaccomputing.com/en/documents/Barebones/G8825Z5_G8825Z5U2BC-325X-575#dc", "category": "Gen  "date": "2026/04/07", "text": "5/4-8 驗 smart city Test plan", "category": "Project", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_2520", "date": "2026/04/17", "text": "//20260417", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2521", "date": "2026/04/17", "text": "慈濟 log 解釋", "category": "Project", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2522", "date": "2026/04/17", "text": "實測頻寬達 80+ GB/s 且 ECC 錯誤為 0，已實質證實 PCIe Gen 4 運作正常，Log 中的 FAILED 標記確認為測試軟體對內部拓樸之顯示誤差。", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_2524", "date": "2026/04/17", "text": "===========================================", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2525", "date": "2026/04/17", "text": "1. 頻寬數據：為何說是 80+ GB/s？", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2526", "date": "2026/04/17", "text": "雖然 hl_qual 工具因為誤判 Gen 2 而報錯，但它在執行過程中真實記錄了數據交換的速度。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2528", "date": "2026/04/17", "text": "在 Log 中搜尋 Bidirectional PCItest measured BW 這一行：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2530", "date": "2026/04/17", "text": "證據位置：在 Step 1 的測試過程或最後的詳細輸出中。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2532", "date": "2026/04/17", "text": "數據解讀：您之前的測試顯示雙向頻寬（Bidirectional BW）約為 82.6 GB/s。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2534", "date": "2026/04/17", "text": "物理判定：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2536", "date": "2026/04/17", "text": "PCIe Gen 2 x16：理論極限僅約 8 GB/s。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2538", "date": "2026/04/17", "text": "PCIe Gen 3 x16：理論極限僅約 16 GB/s。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2540", "date": "2026/04/17", "text": "判定結論：如果硬體真的如工具所說是 Gen 2，它是絕對物理性地無法跑出 80 GB/s 的速度。這個數據的存在，直接證明了物理鏈路（Physical Layer）正以 Gen 4 的速度在跑。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2542", "date": "2026/04/17", "text": "2. ECC 錯誤：為何說是 0？", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2543", "date": "2026/04/17", "text": "在 Log 的結尾部分，有一個硬體健康計數表（Test result summary 之前的表格）：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2545", "date": "2026/04/17", "text": "關鍵欄位：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2547", "date": "2026/04/17", "text": "Sram Serr count: 0", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2549", "date": "2026/04/17", "text": "Sram Derr count: 0", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2551", "date": "2026/04/17", "text": "Dram Serr count: 0", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2553", "date": "2026/04/17", "text": "Dram Derr count: 0 (ECC 偵測到的雙位元錯誤)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2555", "date": "2026/04/17", "text": "解讀：即便在高壓的 80+ GB/s 傳輸下，這些數值全部為 0，代表 Gaudi2 內部的記憶體（HBM）與靜態隨機存取記憶體（SRAM）完全沒有數據損壞。這證明了硬體運作極其穩定且品質優良。", "category": "GPU", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2557", "date": "2026/04/17", "text": "3. FAILED 標記的「誤報」證據", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2558", "date": "2026/04/17", "text": "請看 Log 中這幾行矛盾的資訊：", "category": "General", "ips": [], "is_command": false, "is_todo": true, "edited": false}, {"id": "log_2560", "date": "2026/04/17", "text": "工具自打嘴巴：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2562", "date": "2026/04/17", "text": "工具顯示：PCI link speed (gen): 16GT/s (這就是 Gen 4 的物理訊號頻率)。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2564", "date": "2026/04/17", "text": "工具卻報錯：Expected pci gen : 4, got pci gen : 2。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2566", "date": "2026/04/17", "text": "原因：這是因為 Gaudi2 伺服器內部有 PCIe Switch（交換晶片）。hl_qual 在掃描設備樹（Topology）時，讀取到了某些中間轉接層回傳的錯誤屬性（可能是韌體回報值或節能狀態下的低速值），導致它「以為」頻寬不足。", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2568", "date": "2026/04/17", "text": "總結判斷邏輯", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2569", "date": "2026/04/17", "text": "您可以這樣跟品管或客戶解釋：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2571", "date": "2026/04/17", "text": "工具的眼見（FAILED）是虛的：因為它只看設備回報的屬性文字。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2573", "date": "2026/04/17", "text": "實測的數據（82 GB/s）是實的：因為這是資料真實流過 PCIe 通道的速度。Gen 2 的管子（12GB/s）不可能流出 Gen 4 的水量（80GB/s）。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2575", "date": "2026/04/17", "text": "因此，這份報告在物理層面與性能層面實際上是 Perfect Pass。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2580", "date": "2026/04/17", "text": "從這份日誌截圖中，可以將證據拆解為三個層次：「實測性能」、「物理規格」以及「錯誤監控」。以下是具體看出的地方：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2582", "date": "2026/04/17", "text": "1. 實測頻寬達 80+ GB/s (證據在「Bidirectional PCI test」)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2583", "date": "2026/04/17", "text": "在 Log 的中間部分，可以看到針對所有 PCIe Tree 的壓力測試結果：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2585", "date": "2026/04/17", "text": "關鍵文字：PCIe tree number 0 Measured BW: 82.6639 GB/s (Tree 1~3 也都在 82.6 GB/s 左右)。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2587", "date": "2026/04/17", "text": "解讀邏輯：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2589", "date": "2026/04/17", "text": "PCIe Gen 2 x16 的極限速度約為 8 GB/s。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2591", "date": "2026/04/17", "text": "PCIe Gen 4 x16 的理論速度約為 31.5 GB/s，但在 Gaudi2 的雙向測試（Bidirectional）中，數據是同時上下行對噴，所以數值會翻倍。", "category": "GPU", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2593", "date": "2026/04/17", "text": "結論：能跑出 82.6 GB/s，物理上只有 Gen 4 的頻寬才支撐得住。如果硬體真的是 Gen 2，速度會直接卡在 10 GB/s 以下。", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2595", "date": "2026/04/17", "text": "2. ECC 錯誤為 0 (證據在「Device measurement report」)", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2596", "date": "2026/04/17", "text": "在 Log 接近結尾的表格中，列出了 8 張卡（Bus ID: d0:00.0 到 1c:00.0）的健康狀態：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2598", "date": "2026/04/17", "text": "關鍵文字：", "category": "General", "ips": [], "is_command": false, "  "is_todo": false, "edited": false}, {"id": "log_2619", "date": "2026/04/17", "text": "總結給客戶/主管的說法：", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2620", "date": "2026/04/17", "text": "「這份 Log 雖然顯示 FAILED，但**實測性能（82.6 GB/s）與物理訊號偵測（16GT/s）**均已達到 PCIe Gen 4 標準，且在高壓測試下 ECC 錯誤（Derr count）維持為 0。這足以證明硬體物理層運作完美，Log 中的錯誤字樣純屬軟體對內部 Switch 拓樸的識別誤差，不影響設備效能與出貨品質。」", "category": "Network", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2621", "date": "2026/04/17", "text": "===========================================", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2624", "date": "2026/04/17", "text": "ollama 部署", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2626", "date": "2026/04/17", "text": "Rack infra structure depolyment", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2628", "date": "2024/04/23", "text": "//20240423", "category": "General", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2629", "date": "2024/04/23", "text": "4/21-4/22 午餐 台南 smart city rehearsal", "category": "Project", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2630", "date": "2024/04/23", "text": "4/21-4/22 住家到高鐵站來回 台南 smart city rehearsal", "category": "Travel / Expense", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2631", "date": "2024/04/23", "text": "4/21-4/22 苗栗、台南高鐵站來回 台南 smart city rehearsal", "category": "Travel / Expense", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2632", "date": "2024/04/23", "text": "4/21-4/22 沙崙、台南火車站 台南 smart city rehearsal", "category": "Project", "ips": [], "is_command": false, "is_todo": false, "edited": false}, {"id": "log_2633", "date": "2024/04/23", "text": "4/21-4/22 台南住宿 台南 let data = [];
let collapsed = {};
let editingId = null;

function makeId() {
  return "log_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function ensureIds(items) {
  return items.map(item => ({
    id: item.id || makeId(),
    date: item.date || "未分類日期",
    text: item.text || "",
    category: item.category || "General",
    ips: Array.isArray(item.ips) ? item.ips : [],
    is_command: !!item.is_command,
    is_todo: !!item.is_todo,
    edited: !!item.edited
  }));
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapsed));
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  const rawCollapse = localStorage.getItem(COLLAPSE_KEY);

  data = raw ? ensureIds(JSON.parse(raw)) : ensureIds(INITIAL_DATA);
  collapsed = rawCollapse ? JSON.parse(rawCollapse) : {};
}

function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function extractIps(text) {
  const matches = String(text || "").match(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g);
  return matches || [];
}

function highlightIps(text, ips) {
  let out = esc(text);
  for (const ip of ips || []) {
    out = out.replaceAll(ip, '<span class="hl-ip">' + esc(ip) + '</span>');
  }
  return out;
}

function normalizeDateForSort(date) {
  const d = String(date || "").replaceAll("-", "/");
  const parts = d.split("/").map(x => x.padStart(2, "0"));

  if (parts.length === 3) return parts[0].padStart(4, "0") + parts[1] + parts[2];
  if (parts.length === 2) return parts[0].padStart(4, "0") + parts[1] + "00";

  return d;
}

function getFilteredData() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const category = document.getElementById("category").value;
  const cmdOnly = document.getElementById("cmdOnly").checked;
  const todoOnly = document.getElementById("todoOnly").checked;

  return data.filter(item => {
    if (category && item.category !== category) return false;
    if (cmdOnly && !item.is_command) return false;
    if (todoOnly && !item.is_todo) return false;

    const hay = [
      item.date,
      item.text,
      item.category,
      ...(item.ips || [])
    ].join(" ").toLowerCase();

    return !q || hay.includes(q);
  });
}

function groupByDate(items) {
  const map = new Map();

  for (const item of items) {
    const date = item.date || "未分類日期";
    if (!map.has(date)) map.set(date, []);
    map.get(date).push(item);
  }

  const groups = Array.from(map.entries()).map(([date, rows]) => ({
    date,
    rows
  }));

  const sortMode = document.getElementById("dateSort").value;

  groups.sort((a, b) => {
    const av = normalizeDateForSort(a.date);
    const bv = normalizeDateForSort(b.date);

    if (sortMode === "asc") return av.localeCompare(bv);
    return bv.localeCompare(av);
  });

  return groups;
}

function initCategory() {
  const select = document.getElementById("category");
  const current = select.value;
  const cats = Array.from(new Set(data.map(x => x.category || "General"))).sort();

  select.innerHTML =
    '<option value="">全部分類</option>' +
    cats.map(c => '<option value="' + esc(c) + '">' + esc(c) + '</option>').join("");

  select.value = current;
}

function updateStats(filtered) {
  const total = data.length;
  const visible = filtered.length;
  const cmds = filtered.filter(x => x.is_command).length;
  const todos = filtered.filter(x => x.is_todo).length;
  const ips = new Set(filtered.flatMap(x => x.ips || [])).size;
  const edited = filtered.filter(x => x.edited).length;

  document.getElementById("stats").innerHTML =
    '<div>全部筆數：<strong>' + total + '</strong></div>' +
    '<div>目前顯示：<strong>' + visible + '</strong></div>' +
    '<div>指令：<strong>' + cmds + '</strong></div>' +
    '<div>TODO：<strong>' + todos + '</strong></div>' +
    '<div>IP：<strong>' + ips + '</strong></div>' +
    '<div>已修改：<strong>' + edited + '</strong></div>';
}

function openEdit(id) {
  const item = data.find(x => x.id === id);
  if (!item) return;

  editingId = id;

  document.getElementById("editText").value = item.text || "";
  document.getElementById("editDate").value = item.date || "";
  document.getElementById("editCategory").value = item.category || "General";
  document.getElementById("editCommand").checked = !!item.is_command;
  document.getElementById("editTodo").checked = !!item.is_todo;

  document.getElementById("editModal").style.display = "flex";
}

function closeEdit() {
  editingId = null;
  document.getElementById("editModal").style.display = "none";
}

function saveEdit() {
  const item = data.find(x => x.id === editingId);
  if (!item) return;

  item.text = document.getElementById("editText").value.trim();
  item.date = document.getElementById("editDate").value.trim() || "未分類日期";
  item.category = document.getElementById("editCategory").value.trim() || "General";
  item.is_command = document.getElementById("editCommand").checked;
  item.is_todo = document.getElementById("editTodo").checked;
  item.ips = extractIps(item.text);
  item.edited = true;

  save();
  closeEdit();
  render();
}

function removeItem(id) {
  data = data.filter(x => x.id !== id);
  save();
  render();
}

function toggleCommand(id) {
  const item = data.find(x => x.id === id);
  if (!item) return;
  item.is_command = !item.is_command;
  item.edited = true;
  save();
  render();
}

function toggleTodo(id) {
  const item = data.find(x => x.id === id);
  if (!item) return;
  item.is_todo = !item.is_todo;
  item.edited = true;
  save();
  render();
}

function resetData() {
  if (!confirm("確定要還原原始資料？目前修改會消失。")) return;

  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(COLLAPSE_KEY);

  load();
  render();
}

function exportHtml() {
  save();

  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");

  a.href = url;
  a.download =
    "tabos_worklog_export_" +
    now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate()) + "_" +
    pad(now.getHours()) + "-" + pad(now.getMinutes()) + "-" + pad(now.getSeconds()) +
    ".html";

  a.click();
  URL.revokeObjectURL(url);
}

function render() {
  initCategory();

  const filtered = getFilteredData();
  updateStats(filtered);

  const groups = groupByDate(filtered);
  const app = document.getElementById("app");

  if (!groups.length) {
    app.innerHTML = '<div class="empty">沒有符合條件的工作日誌。</div>';
    return;
  }

  app.innerHTML = groups.map(group => {
    const isCollapsed = !!collapsed[group.date];

    return '<div class="card">' +
      '<div class="date-title">' +
        '<h2>' + esc(group.date) + '</h2>' +
        '<button onclick="collapsed[\'' + esc(group.date) + '\']=!collapsed[\'' + esc(group.date) + '\']; save(); render();">' +
          (isCollapsed ? "展開" : "收合") +
        '</button>' +
      '</div>' +

      (isCollapsed ? "" : group.rows.map(item => {
        const classes = "item" + (item.is_command ? " command" : "");
        const ipTags = (item.ips || []).map(ip => '<span class="tag ip">' + esc(ip) + '</span>').join("");

        return '<div class="' + classes + '">' +
          '<div>' +
            '<div class="text">' + highlightIps(item.text, item.ips) + '</div>' +
            '<div class="meta">' +
              '<span class="tag">' + esc(item.category) + '</span>' +
              (item.is_command ? '<span class="tag cmd">command</span>' : '') +
              (item.is_todo ? '<span class="tag todo">TODO</span>' : '') +
              (item.edited ? '<span class="tag edited">edited</span>' : '') +
              ipTags +
            '</div>' +
          '</div>' +

          '<div class="actions">' +
            '<button onclick="openEdit(\'' + item.id + '\')" class="primary">修改</button>' +
            '<button onclick="toggleCommand(\'' + item.id + '\')">指令</button>' +
            '<button onclick="toggleTodo(\'' + item.id + '\')" class="warn">TODO</button>' +
            '<button onclick="removeItem(\'' + item.id + '\')" class="danger">移除</button>' +
          '</div>' +
        '</div>';
      }).join("")) +
    '</div>';
  }).join("");
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("category").addEventListener("change", render);
document.getElementById("dateSort").addEventListener("change", render);
document.getElementById("cmdOnly").addEventListener("change", render);
document.getElementById("todoOnly").addEventListener("change", render);

document.getElementById("expandAll").addEventListener("click", () => {
  collapsed = {};
  save();
  render();
});

document.getElementById("collapseAll").addEventListener("click", () => {
  for (const item of data) {
    collapsed[item.date || "未分類日期"] = true;
  }
  save();
  render();
});

document.getElementById("exportBtn").addEventListener("click", exportHtml);
document.getElementById("resetBtn").addEventListener("click", resetData);
document.getElementById("cancelEdit").addEventListener("click", closeEdit);
document.getElementById("saveEdit").addEventListener("click", saveEdit);

load();
render();
</script>
